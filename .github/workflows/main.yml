name: CI-CD-Separated-Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  CI_Stage_Build_And_Test:
    name: "CI: Build and Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build
        run: echo "Build successful"

      - name: Test
        run: echo "Tests passed"

  CD_Stage_Deploy_To_Render:
    name: "CD: Deploy"
    needs: CI_Stage_Build_And_Test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
