<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyğu Abdullayeva - DevOps CI/CD Demo</title>
    <style>
        /* Ümumi dizayn */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Başlıq */
        h1 {
            font-size: 2.8em;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Alt başlıq */
        h2 {
            font-size: 2em;
            margin: 0.3em 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            animation: fadeIn 2s ease-in-out;
        }

        /* Paragraf */
        p {
            font-size: 1.3em;
            max-width: 700px;
            line-height: 1.6;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: fadeIn 2.5s ease-in-out;
        }

        /* Sadə animasiya */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Box dizayn üçün info */
        .info-box {
            background: rgba(0,0,0,0.3);
            padding: 25px 50px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            animation: fadeIn 3s ease-in-out;
        }

        /* Button əlavə etmək üçün */
        .button {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: #ff6a00;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
        }

        .button:hover {
            background: #ff9500;
        }
    </style>
</head>
<body>
    <h1>DevOps & CI/CD Demo</h1>
    <h2>Duyğu Abdullayeva</h2>
    <div class="info-box">
        <p>Azərbaycan Texniki Universiteti</p>
        <p>Komputer Riyaziyyatı</p>
        <p>2025 - 2027</p>
        <p>DevOps Təcrübəsi</p>
    </div>
    <a class="button" href="#" target="_blank">Layihəni Gör</a>
</body>
</html>
